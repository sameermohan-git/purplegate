name: OSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"   # weekly Monday 06:17 UTC
  workflow_dispatch: {}

permissions: read-all

jobs:
  scorecard:
    name: Run scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write    # upload SARIF
      id-token: write           # publish results to the public dashboard
      contents: read
      actions: read

    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.12.2
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186  # v2.4.1
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true   # publish to securityscorecards.dev

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@b2f9ef845756500b97acbdaf5c1dd4e9c1d15734  # v3.35.2
        with:
          sarif_file: scorecard.sarif

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: scorecard-sarif
          path: scorecard.sarif
