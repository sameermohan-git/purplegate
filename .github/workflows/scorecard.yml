name: OSSF Scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"   # weekly Monday 06:17 UTC
  workflow_dispatch: {}

permissions: read-all

jobs:
  scorecard:
    name: Run scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write    # upload SARIF
      id-token: write           # publish results to the public dashboard
      contents: read
      actions: read

    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186  # v2.4.1
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: true   # publish to securityscorecards.dev

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          sarif_file: scorecard.sarif

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-sarif
          path: scorecard.sarif
