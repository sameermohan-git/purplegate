name: Self-test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: self-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      # NOTE: harden-runner pinned by SHA in production; placeholder here
      # until we cut v1.
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install package + dev extras
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/unit -q

  fixture-smoke:
    name: Fixture smoke-tests (no Docker)
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - vuln_fastapi
          - vuln_supabase_sql
          - vuln_workflow
          - clean_app
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      # Smoke-test the orchestrator end-to-end against each fixture as if
      # its repo root were the working directory. Scanners that aren't on
      # PATH will return 0 findings and log a warning — that's expected
      # for the in-Action-image-less test. We assert only that the run
      # succeeds and the expected custom-rule findings fire.
      - name: Run orchestrator against ${{ matrix.fixture }}
        run: |
          cd tests/fixtures/${{ matrix.fixture }}
          # Override GITHUB_WORKSPACE so the orchestrator treats this fixture
          # directory as the repo root (otherwise it would scan the
          # purplegate repo itself, not the fixture).
          GITHUB_WORKSPACE="$(pwd)" python -m src.orchestrator \
            --config .purplegate/config.yml \
            --allowlist .purplegate/allowlist.yml \
            --fail-on none \
            --report-format json,markdown,sarif

      - name: Validate finding counts
        run: |
          python - <<'PY'
          import json, os
          name = os.environ["FIXTURE"]
          report = json.loads(open("/tmp/reports/audit.json").read())
          rule_ids = [f["rule_id"] for f in report["findings"]]
          # Custom-rule findings we can assert without external binaries.
          expect = {
              "vuln_supabase_sql": [
                  "iac/supabase/missing-rls-on-public-table",
                  "iac/supabase/rls-enabled-without-policy",
              ],
              "vuln_workflow": [
                  "workflows/fallback/pull-request-target-untrusted-input",
                  "workflows/fallback/checkout-persists-credentials",
              ],
              "vuln_fastapi": [
                  "sast/fastapi/route-without-auth-dep",
              ],
              "clean_app": [],
          }[name]
          missing = [r for r in expect if r not in rule_ids]
          assert not missing, f"missing expected findings: {missing} (got {rule_ids})"
          if name == "clean_app":
              # clean_app must produce 0 findings from our custom rules.
              custom = [
                  r for r in rule_ids
                  if r.startswith("iac/supabase/")
                  or r.startswith("workflows/fallback/")
                  or r.startswith("sast/fastapi/")
              ]
              assert not custom, f"clean_app produced custom-rule findings: {custom}"
          print(f"OK: {name} rule_ids={rule_ids}")
          PY
        env:
          FIXTURE: ${{ matrix.fixture }}

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: reports-${{ matrix.fixture }}
          path: /tmp/reports/
          if-no-files-found: warn
