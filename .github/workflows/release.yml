name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v1.0.0)"
        required: true

# Top-level defaults to read-only; jobs below opt in to write scopes only
# where they need them (OSSF Scorecard Token-Permissions check).
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build, sign, and publish
    runs-on: ubuntu-latest
    permissions:
      contents: write       # attach SBOMs + signatures to the GitHub Release
      packages: write       # push image to GHCR
      id-token: write       # cosign keyless + attest-build-provenance OIDC
      attestations: write   # actions/attest-build-provenance
    outputs:
      image-digest: ${{ steps.build-push.outputs.digest }}
      image-ref: ghcr.io/${{ github.repository }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          # Push BOTH the v-prefixed and unprefixed semver tags so consumers
          # can use either form. docker/metadata-action's {{version}} pattern
          # strips the leading `v` from the git tag, AND silently rejects
          # `pattern=v{{version}}` for pre-release versions. Workaround:
          # use `type=ref,event=tag` to emit the raw git tag (`v0.1.0-alpha.5`)
          # alongside `type=semver,pattern={{version}}` (`0.1.0-alpha.5`).
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=tag
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build-push.outputs.digest }}
          IMAGE: ghcr.io/${{ github.repository }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SLSA / SBOM attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build-push.outputs.digest }}
          push-to-registry: true

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build-push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0
        with:
          image: ghcr.io/${{ github.repository }}@${{ steps.build-push.outputs.digest }}
          format: cyclonedx-json
          output-file: sbom.cdx.json

      # Sign each SBOM as a detached blob signature via cosign keyless. cosign
      # 4.x defaults to the new Sigstore bundle format — a single self-
      # contained JSON file holding the signature, the Fulcio-issued
      # certificate, and the inclusion proof from Rekor. The legacy
      # --output-signature / --output-certificate flags are deprecated and
      # silently ignored under --new-bundle-format=true. Emits one
      # `<file>.sigstore` per SBOM. Consumers verify with:
      #   cosign verify-blob \
      #     --bundle sbom.spdx.json.sigstore \
      #     --new-bundle-format \
      #     --certificate-identity-regexp 'https://github.com/sameermohan-git/purplegate/.github/workflows/release\.yml@.+' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
      #     sbom.spdx.json
      - name: Sign SBOM (SPDX)
        run: |
          cosign sign-blob --yes \
            --bundle sbom.spdx.json.sigstore \
            sbom.spdx.json

      - name: Sign SBOM (CycloneDX)
        run: |
          cosign sign-blob --yes \
            --bundle sbom.cdx.json.sigstore \
            sbom.cdx.json

      - name: Attach SBOMs + signatures to release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8  # v2.3.2
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            sbom.spdx.json
            sbom.spdx.json.sigstore
            sbom.cdx.json
            sbom.cdx.json.sigstore
          generate_release_notes: true

  verify:
    name: Post-release verification (dog-food)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read   # cosign verify pulls a public manifest; no writes needed
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003  # v4.1.1

      - name: Verify image signature
        env:
          IMAGE: ${{ needs.build.outputs.image-ref }}
          DIGEST: ${{ needs.build.outputs.image-digest }}
        run: |
          cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/.github/workflows/release\.yml@.+' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
