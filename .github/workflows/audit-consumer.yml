name: Dog-food audit

# Runs the Action against ITS OWN repo. Catches regressions where our
# published image would mis-handle a real project.

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: audit-consumer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit purplegate with purplegate
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450  # v2.19.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: ./
        with:
          config: .purplegate/config.yml
          fail-on: high
          # No LLM probe here — we're static-scanning our own repo.
          llm-provider: none
          comment-on-pr: "false"
          upload-sarif: "true"
