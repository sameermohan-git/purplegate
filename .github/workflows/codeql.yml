name: CodeQL

# Static-analysis SAST via GitHub's CodeQL. Required for OSSF Scorecard's
# SAST check to score >0; semgrep also runs in self-test but Scorecard
# specifically looks for CodeQL or Sonar.
#
# Findings flow to the repo's Security → Code scanning tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 7 * * 1"   # weekly Monday 07:23 UTC, offset from Scorecard

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to Code Scanning
      packages: read           # CodeQL pulls its query packs

    strategy:
      fail-fast: false
      matrix:
        language: [python]

    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40  # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          languages: ${{ matrix.language }}
          # security-extended adds higher-recall rules over the default suite
          # at modest noise cost; security-and-quality is too noisy for a
          # security-tooling repo.
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a  # v3.35.2
        with:
          category: "/language:${{ matrix.language }}"
